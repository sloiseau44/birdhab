name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: birdhab
          POSTGRES_PASSWORD: birdhab
          POSTGRES_DB: birdhab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U birdhab -d birdhab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer le JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & tests (mvn verify)
        run: mvn --batch-mode --update-snapshots verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/birdhab
          SPRING_DATASOURCE_USERNAME: birdhab
          SPRING_DATASOURCE_PASSWORD: birdhab

      - name: Publier les rapports de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7

  frontend:
    name: Frontend (build, lint & tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Node.js 24 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: frontend

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: frontend

      - name: Vérification des types & build
        run: npm run build
        working-directory: frontend

      - name: Tests (Vitest)
        run: npm test
        working-directory: frontend