spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        - id: property-service
          uri: http://localhost:8082
          predicates:
            - Path=/properties/**
        - id: tenant-service
          uri: http://localhost:8083
          predicates:
            - Path=/tenants/**
        - id: lease-service
          uri: http://localhost:8084
          predicates:
            - Path=/leases/**
        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/payments/**
        - id: document-service
          uri: http://localhost:8086
          predicates:
            - Path=/documents/**

server:
  port: 8080
