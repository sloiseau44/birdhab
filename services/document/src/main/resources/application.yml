spring:
  application:
    name: document-service

  datasource:
    url: jdbc:postgresql://localhost:5432/birdhab
    username: birdhab
    password: birdhab

  jpa:
    hibernate:
      ddl-auto: validate   # le schéma est piloté par Flyway, jamais par Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: document

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: document   # schéma Postgres dédié : la base "birdhab" est partagée entre
                        # microservices, mais chaque service isole ses tables et son
                        # historique flyway_schema_history dans son propre schéma
                        # (sinon collision avec celui du service auth, en schéma public)
    default-schema: document

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8086

# Config JWT — même secret que le service auth (birdhab.jwt.secret) : document ne
# génère jamais de jetons, il valide uniquement ceux émis par auth.
birdhab:
  jwt:
    secret: ${JWT_SECRET:changeme-local-dev-secret-key-not-for-production-use-only}

# Config MinIO (voir docker/README.md pour les identifiants locaux)
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:birdhab}
  secret-key: ${MINIO_SECRET_KEY:birdhab123}
  bucket: birdhab-documents

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
