services:

  postgres:
    image: postgres:16-alpine
    container_name: birdhab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: birdhab
      POSTGRES_PASSWORD: birdhab
      POSTGRES_DB: birdhab
    ports:
      - "5432:5432"
    volumes:
      - birdhab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birdhab -d birdhab"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: birdhab-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: birdhab
      MINIO_ROOT_PASSWORD: birdhab123
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - birdhab_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  birdhab_postgres_data:
  birdhab_minio_data: