openapi: 3.0.3
info:
  title: Birdhab — Property Service API
  description: >
    Service de gestion des biens immobiliers de Birdhab. Permet à un
    propriétaire authentifié de créer, consulter, modifier et supprimer
    ses biens (logements, parkings, commerces).
  version: 1.0.0
  contact:
    name: Birdhab
    email: stephaneloiseau44@gmail.com
  license:
    name: BUSL-1.1

servers:
  - url: http://localhost:8082
    description: Environnement local (via API Gateway ou direct)

tags:
  - name: Properties
    description: Gestion des biens immobiliers du propriétaire authentifié

paths:
  /properties:
    post:
      tags: [Properties]
      summary: Ajouter un bien
      description: >
        Crée un nouveau bien rattaché au propriétaire authentifié.
        Le propriétaire (`ownerId`) est déterminé à partir du contexte
        d'authentification, jamais depuis le corps de la requête.
      operationId: createProperty
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyRequest'
      responses:
        '201':
          description: Bien créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
        '400':
          description: Requête invalide (champ manquant, surface négative...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Properties]
      summary: Lister les biens du propriétaire authentifié
      operationId: listProperties
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des biens du propriétaire
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PropertyResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /properties/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Properties]
      summary: Récupérer un bien par son identifiant
      operationId: getProperty
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Bien trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bien introuvable ou n'appartenant pas au propriétaire authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Properties]
      summary: Modifier un bien
      operationId: updateProperty
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyRequest'
      responses:
        '200':
          description: Bien mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bien introuvable ou n'appartenant pas au propriétaire authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Properties]
      summary: Supprimer un bien
      operationId: deleteProperty
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Bien supprimé (aucun contenu)
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Bien introuvable ou n'appartenant pas au propriétaire authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PropertyType:
      type: string
      description: Type de bien
      enum: [LOGEMENT, PARKING, COMMERCE]

    Address:
      type: object
      required: [street, postalCode, city]
      properties:
        street:
          type: string
          example: 12 rue des Oliviers
        postalCode:
          type: string
          pattern: '^[0-9]{5}$'
          example: '06000'
        city:
          type: string
          example: Nice

    PropertyRequest:
      type: object
      required: [address, type, surface, referenceRent]
      properties:
        address:
          $ref: '#/components/schemas/Address'
        type:
          $ref: '#/components/schemas/PropertyType'
        surface:
          type: number
          format: double
          description: Surface habitable en m²
          minimum: 1
          example: 45.5
        referenceRent:
          type: number
          format: double
          description: Loyer de référence mensuel hors charges, en euros
          minimum: 0
          example: 850.00

    PropertyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
          description: Identifiant du propriétaire (User.id du service auth)
        address:
          $ref: '#/components/schemas/Address'
        type:
          $ref: '#/components/schemas/PropertyType'
        surface:
          type: number
          format: double
          example: 45.5
        referenceRent:
          type: number
          format: double
          example: 850.00
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: La surface doit être positive
        path:
          type: string
          example: /properties
