openapi: 3.0.3
info:
  title: Birdhab — Auth Service API
  description: >
    Service d'authentification de Birdhab. Gère la création de compte,
    la connexion, le renouvellement et la révocation des jetons JWT.
  version: 1.0.0
  contact:
    name: Birdhab
    email: stephaneloiseau44@gmail.com
  license:
    name: BUSL-1.1

servers:
  - url: http://localhost:8081
    description: Environnement local (via API Gateway ou direct)

tags:
  - name: Auth
    description: Inscription, connexion et gestion des jetons

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Créer un compte propriétaire
      description: >
        Crée un nouveau compte utilisateur avec le rôle OWNER par défaut.
        Le rôle TENANT sera attribuable via un flux d'invitation dédié
        (hors MVP, voir CONTEXT.md).
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Compte créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Requête invalide (email mal formé, mot de passe trop faible...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Un compte existe déjà avec cet email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Se connecter
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Email ou mot de passe incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Compte désactivé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renouveler le jeton d'accès
      description: >
        Échange un refresh token valide contre un nouveau couple
        access/refresh token (rotation du refresh token).
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Nouveau couple de jetons émis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh token invalide, expiré ou révoqué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Se déconnecter
      description: Révoque le refresh token fourni.
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Déconnexion effectuée (aucun contenu)
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Récupérer le profil du compte connecté
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil de l'utilisateur authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: proprietaire@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: MotDePasseSolide123!
        firstName:
          type: string
          example: Stéphane
        lastName:
          type: string
          example: Loiseau

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
          description: Jeton JWT à courte durée de vie, à utiliser en Authorization Bearer
        refreshToken:
          type: string
          description: Jeton à longue durée de vie permettant de renouveler l'accessToken
        expiresIn:
          type: integer
          format: int64
          description: Durée de validité de l'accessToken, en secondes
          example: 900

    UserProfile:
      type: object
      required: [id, email, roles]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
            enum: [OWNER, ADMIN, TENANT]

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Le mot de passe doit contenir au moins 8 caractères
        path:
          type: string
          example: /auth/register