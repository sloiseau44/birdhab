openapi: 3.0.3
info:
  title: Birdhab — Document Service API
  description: >
    Service de stockage des documents d'identité des locataires de Birdhab
    (upload, consultation, téléchargement, suppression), stockés dans MinIO.
    Permet à un propriétaire authentifié de gérer les documents rattachés à
    ses locataires. `tenantId` n'est pas validé par appel réseau vers le
    service `tenant` (même convention que les autres relations inter-services
    — voir CLAUDE.md). Le rattachement à un bail et la génération de contrats
    PDF restent hors périmètre de cette première version.

    Le type de fichier réellement stocké (`contentType` dans la réponse) est
    déterminé en inspectant les premiers octets du contenu envoyé (signature
    PDF/JPEG/PNG), jamais uniquement à partir du `Content-Type` déclaré par
    le client (facilement falsifiable) : un fichier dont le contenu ne
    correspond à aucune des trois signatures est rejeté, même si son
    `Content-Type` déclaré prétend être l'un des types acceptés.
  version: 1.0.0
  contact:
    name: Birdhab
    email: stephaneloiseau44@gmail.com
  license:
    name: BUSL-1.1

servers:
  - url: http://localhost:8086
    description: Environnement local (via API Gateway ou direct)

tags:
  - name: Documents
    description: Documents d'identité des locataires du propriétaire authentifié

paths:
  /documents:
    post:
      tags: [Documents]
      summary: Uploader un document d'identité
      description: >
        Stocke un fichier dans MinIO et enregistre ses métadonnées, rattachés
        au propriétaire authentifié et à un locataire existant. Types
        acceptés : PDF, JPEG, PNG. Taille maximale : 10 Mo.
      operationId: uploadDocument
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [tenantId, file]
              properties:
                tenantId:
                  type: string
                  format: uuid
                  description: Identifiant du locataire concerné (Tenant.id du service tenant)
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Document uploadé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Requête invalide (fichier manquant, type non supporté, taille excessive...)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Documents]
      summary: Lister les documents du propriétaire authentifié
      operationId: listDocuments
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: query
          required: false
          description: Filtre optionnel sur un locataire donné
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des documents du propriétaire
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Documents]
      summary: Récupérer les métadonnées d'un document par son identifiant
      operationId: getDocument
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Document trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document introuvable ou n'appartenant pas au propriétaire authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Documents]
      summary: Supprimer un document (métadonnées et fichier MinIO)
      operationId: deleteDocument
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Document supprimé (aucun contenu)
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document introuvable ou n'appartenant pas au propriétaire authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}/content:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Documents]
      summary: Télécharger le contenu binaire d'un document
      operationId: downloadDocumentContent
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contenu du fichier
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Non authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Document introuvable ou n'appartenant pas au propriétaire authentifié
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DocumentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
          description: Identifiant du propriétaire (User.id du service auth)
        tenantId:
          type: string
          format: uuid
        fileName:
          type: string
          example: carte-identite-julie-martin.pdf
        contentType:
          type: string
          example: application/pdf
        sizeBytes:
          type: integer
          format: int64
          example: 245678
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Type de fichier non supporté (application/zip)
        path:
          type: string
          example: /documents
